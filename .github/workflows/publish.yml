name: Publish

on:
  push:
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

# NOTE: Cross-compiled precompiled gems are disabled for now because
# the rb-sys-dock Docker images ship Rust 1.77 which cannot compile
# crates that use the Rust 2024 edition (stabilized in 1.85+). Our
# dependency tree pulls in such crates (home, clap_lex). Once rb-sys
# updates their Docker images, re-enable the cross-gems job and add
# it back to the release job's `needs:` list.
#
# Until then, only the source gem is published. Users need a Rust
# toolchain to install it (`gem install stoolap` compiles from source).

jobs:
  source-gem:
    name: Build source gem
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oxidize-rb/actions/setup-ruby-and-rust@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          cargo-cache: true
          cache-version: v1

      - name: Ensure gemspec version matches the git tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          GEM_VERSION=$(grep VERSION lib/stoolap/version.rb | head -n 1 | cut -d'"' -f2)
          if [ "v$GEM_VERSION" != "${{ github.ref_name }}" ]; then
            echo "::error::gemspec version v$GEM_VERSION does not match tag ${{ github.ref_name }}"
            exit 1
          fi

      - name: Build source gem
        run: bundle exec rake build

      - name: Upload source gem
        uses: actions/upload-artifact@v7
        with:
          name: source-gem
          path: pkg/stoolap-*.gem
          if-no-files-found: error
          retention-days: 1

  release:
    name: Publish to RubyGems + GitHub Release
    needs: [source-gem]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    environment: rubygems
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Download source gem
        uses: actions/download-artifact@v8
        with:
          name: source-gem
          path: pkg/

      - name: List gems to publish
        run: ls -l pkg/

      - name: Configure trusted publishing credentials
        uses: rubygems/configure-rubygems-credentials@v1.0.0

      - name: Push gem to RubyGems
        working-directory: pkg/
        run: |
          for gem in *.gem; do
            [ -f "$gem" ] || continue
            echo "pushing $gem"
            set +e
            gem push "$gem" > push.out 2>&1
            status=$?
            set -e
            if [ $status -ne 0 ]; then
              sed 's/^/::error:: /' push.out
              if ! grep -q "Repushing of gem" push.out; then
                exit $status
              fi
              echo "::warning::${gem} already exists on RubyGems, skipping"
            else
              cat push.out
            fi
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: pkg/*.gem
